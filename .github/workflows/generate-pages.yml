name: Generate Local SEO Pages
on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch: {}
  push:
    branches: [ main ]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate pages
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          PAGES_PER_RUN: ${{ secrets.PAGES_PER_RUN }}
        run: python3 scripts/generate_page.py
      - name: Generate service detail pages
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python3 scripts/generate_service_pages.py
      - name: Ping IndexNow
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python3 scripts/ping_indexnow.py
      - name: Commit and push generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --cached || git commit -m "Auto-generate local SEO pages"
          git pull --rebase origin main
          git push
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
