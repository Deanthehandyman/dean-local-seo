name: Generate Local SEO Pages

on:
  schedule:
    - cron: '0 13 * * 1' # Runs at 13:00, only on Monday
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate pages
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          PAGES_PER_RUN: ${{ secrets.PAGES_PER_RUN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/generate_page.py

      - name: Ping IndexNow
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python3 scripts/ping_indexnow.py || true

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update generated pages" || echo "No changes to commit"
          git push

      - name: Ping Google with updated Sitemap
        run: curl "https://www.google.com/ping?sitemap=https://deanthehandyman.github.io/dean-local-seo/sitemap.xml"
